<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitbringliste – Abschlussfeier Seeburger SV '99</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0001A;
    --red-dark: #8a0012;
    --red-light: #f5e0e3;
    --cream: #fdf9f5;
    --dark: #1a1a1a;
    --mid: #555;
    --light: #e8e0d8;
    --card: #ffffff;
    --green: #2e7d51;
    --green-light: #e8f5ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--red);
    color: white;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -20px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .club-badge {
    font-size: 2.2rem;
    margin-bottom: 0.4rem;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  header p {
    margin-top: 0.4rem;
    font-size: 0.9rem;
    opacity: 0.85;
  }
  .event-info {
    display: inline-flex;
    gap: 1rem;
    margin-top: 1rem;
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
  }
  .event-info span { display: flex; align-items: center; gap: 0.3rem; }

  /* MAIN */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  /* STATS BAR */
  .stats {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    flex: 1;
    background: white;
    border-radius: 10px;
    padding: 0.9rem 0.75rem;
    text-align: center;
    border: 1px solid var(--light);
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--red);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--mid);
    margin-top: 0.2rem;
  }

  /* ENTRY FORM */
  .form-card {
    background: white;
    border-radius: 14px;
    border: 1px solid var(--light);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .form-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: var(--dark);
  }
  .form-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    flex: 1;
    min-width: 140px;
  }
  label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--mid);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  input[type="text"], select, textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    border: 1.5px solid var(--light);
    border-radius: 8px;
    padding: 0.55rem 0.75rem;
    color: var(--dark);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, select:focus, textarea:focus {
    border-color: var(--red);
  }
  textarea { resize: vertical; min-height: 60px; }

  /* CATEGORY CHIPS */
  .category-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .chip {
    cursor: pointer;
    border: 1.5px solid var(--light);
    background: white;
    border-radius: 20px;
    padding: 0.35rem 0.8rem;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--red); color: var(--red); }
  .chip.selected { background: var(--red); border-color: var(--red); color: white; }

  .btn-add {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-add:hover { background: var(--red-dark); }
  .btn-add:active { transform: scale(0.98); }

  /* LISTE */
  .list-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  /* CATEGORY GROUPS */
  .cat-group { margin-bottom: 1.25rem; }
  .cat-header {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--mid);
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .cat-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--light);
  }

  .entry-card {
    background: white;
    border: 1px solid var(--light);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .entry-icon {
    font-size: 1.4rem;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }
  .entry-body { flex: 1; }
  .entry-name { font-weight: 600; font-size: 0.95rem; }
  .entry-item { font-size: 0.88rem; color: var(--mid); margin-top: 0.1rem; }
  .entry-note { font-size: 0.82rem; color: #888; margin-top: 0.25rem; font-style: italic; }
  .entry-qty {
    background: var(--red-light);
    color: var(--red);
    font-size: 0.75rem;
    font-weight: 700;
    border-radius: 5px;
    padding: 0.15rem 0.45rem;
    align-self: flex-start;
    white-space: nowrap;
  }
  .btn-delete {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 1.1rem;
    transition: color 0.15s;
    padding: 0.1rem;
    flex-shrink: 0;
  }
  .btn-delete:hover { color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: #aaa;
    font-size: 0.9rem;
  }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 0.5rem; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: white;
    padding: 0.7rem 1.4rem;
    border-radius: 30px;
    font-size: 0.9rem;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .divider {
    height: 1px;
    background: var(--light);
    margin: 1.5rem 0;
  }

  /* COPY BUTTON */
  .btn-copy {
    width: 100%;
    background: white;
    color: var(--mid);
    border: 1.5px solid var(--light);
    border-radius: 10px;
    padding: 0.65rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .btn-copy:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="club-badge">⚽</div>
  <h1>Mitbringliste<br>Abschlussfeier</h1>
  <p>Seeburger SV '99 – Jugend</p>
  <div class="event-info">
    <span>📅 6. Juli 2026</span>
    <span>🏟️ Sportplatz Seeburg</span>
  </div>
</header>

<main>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="countPeople">0</div>
      <div class="stat-label">Eltern<br>eingetragen</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="countItems">0</div>
      <div class="stat-label">Sachen<br>zugesagt</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="countCats">0</div>
      <div class="stat-label">Kategorien<br>abgedeckt</div>
    </div>
  </div>

  <!-- FORMULAR -->
  <div class="form-card">
    <h2>✏️ Jetzt eintragen</h2>

    <div class="form-row">
      <div class="form-group">
        <label>Dein Name *</label>
        <input type="text" id="inputName" placeholder="z. B. Familie Müller">
      </div>
      <div class="form-group">
        <label>Menge / Anzahl</label>
        <input type="text" id="inputQty" placeholder="z. B. 2 Liter">
      </div>
    </div>

    <div class="form-group" style="margin-bottom:0.75rem">
      <label>Kategorie wählen</label>
      <div class="category-chips" id="chips"></div>
    </div>

    <div class="form-group" style="margin-bottom:0.75rem">
      <label>Was bringst du mit? *</label>
      <input type="text" id="inputItem" placeholder="z. B. Kartoffelsalat, Limonade, Servietten …">
    </div>

    <div class="form-group" style="margin-bottom:1rem">
      <label>Anmerkung (optional)</label>
      <textarea id="inputNote" placeholder="z. B. ohne Fleisch, kommt gekühlt …"></textarea>
    </div>

    <button class="btn-add" onclick="addEntry()">+ Eintragen</button>
  </div>

  <!-- LISTE -->
  <div class="list-section">
    <h2>📋 Wer bringt was?</h2>
    <div id="listContainer">
      <div class="empty-state">
        <div class="big">🎉</div>
        Noch keine Einträge – seid die Ersten!
      </div>
    </div>
    <button class="btn-copy" onclick="copyList()">📋 Liste als Text kopieren (für WhatsApp)</button>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
  { label: "🥗 Salat",           id: "salat" },
  { label: "🍞 Brot & Beilagen", id: "brot" },
  { label: "🧁 Kuchen & Süßes",  id: "kuchen" },
  { label: "🧴 Sonstiges",       id: "sonstiges" },
];

const ICONS = {
  salat: "🥗", brot: "🍞",
  kuchen: "🧁", sonstiges: "🧴"
};

let entries = JSON.parse(localStorage.getItem('mitbringliste') || '[]');
let selectedCat = null;

// Build chips
const chipsEl = document.getElementById('chips');
CATEGORIES.forEach(c => {
  const chip = document.createElement('div');
  chip.className = 'chip';
  chip.textContent = c.label;
  chip.dataset.id = c.id;
  chip.onclick = () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
    chip.classList.add('selected');
    selectedCat = c.id;
  };
  chipsEl.appendChild(chip);
});

function save() {
  localStorage.setItem('mitbringliste', JSON.stringify(entries));
}

function addEntry() {
  const name = document.getElementById('inputName').value.trim();
  const item = document.getElementById('inputItem').value.trim();
  const qty  = document.getElementById('inputQty').value.trim();
  const note = document.getElementById('inputNote').value.trim();

  if (!name) { showToast('⚠️ Bitte deinen Namen eintragen!'); return; }
  if (!item)  { showToast('⚠️ Bitte angeben, was du mitbringst!'); return; }

  entries.push({
    id: Date.now(),
    name, item, qty,
    note,
    cat: selectedCat || 'sonstiges',
    ts: new Date().toLocaleString('de-DE')
  });

  save();
  renderList();
  updateStats();

  // Reset
  document.getElementById('inputName').value = '';
  document.getElementById('inputItem').value = '';
  document.getElementById('inputQty').value = '';
  document.getElementById('inputNote').value = '';
  document.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
  selectedCat = null;

  showToast('✅ Danke! Dein Eintrag wurde gespeichert.');
}

function deleteEntry(id) {
  if (!confirm('Eintrag löschen?')) return;
  entries = entries.filter(e => e.id !== id);
  save();
  renderList();
  updateStats();
}

function renderList() {
  const container = document.getElementById('listContainer');
  if (entries.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="big">🎉</div>Noch keine Einträge – seid die Ersten!</div>`;
    return;
  }

  // Group by category
  const groups = {};
  CATEGORIES.forEach(c => { groups[c.id] = []; });
  entries.forEach(e => {
    if (!groups[e.cat]) groups[e.cat] = [];
    groups[e.cat].push(e);
  });

  let html = '';
  CATEGORIES.forEach(c => {
    if (groups[c.id].length === 0) return;
    html += `<div class="cat-group">`;
    html += `<div class="cat-header">${c.label}</div>`;
    groups[c.id].forEach(e => {
      html += `
        <div class="entry-card">
          <div class="entry-icon">${ICONS[e.cat] || '📦'}</div>
          <div class="entry-body">
            <div class="entry-name">${esc(e.name)}</div>
            <div class="entry-item">${esc(e.item)}</div>
            ${e.note ? `<div class="entry-note">${esc(e.note)}</div>` : ''}
          </div>
          ${e.qty ? `<div class="entry-qty">${esc(e.qty)}</div>` : ''}
          <button class="btn-delete" onclick="deleteEntry(${e.id})" title="Löschen">✕</button>
        </div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html;
}

function updateStats() {
  const people = new Set(entries.map(e => e.name)).size;
  const cats = new Set(entries.map(e => e.cat)).size;
  document.getElementById('countPeople').textContent = people;
  document.getElementById('countItems').textContent = entries.length;
  document.getElementById('countCats').textContent = cats;
}

function copyList() {
  if (entries.length === 0) { showToast('⚠️ Die Liste ist noch leer.'); return; }

  let text = '🎉 *Mitbringliste – Abschlussfeier Seeburger SV \'99*\n\n';
  const groups = {};
  CATEGORIES.forEach(c => { groups[c.id] = []; });
  entries.forEach(e => { if (!groups[e.cat]) groups[e.cat] = []; groups[e.cat].push(e); });

  CATEGORIES.forEach(c => {
    if (groups[c.id].length === 0) return;
    text += `${c.label}\n`;
    groups[c.id].forEach(e => {
      text += `• ${e.name}: ${e.item}${e.qty ? ' (' + e.qty + ')' : ''}${e.note ? ' – ' + e.note : ''}\n`;
    });
    text += '\n';
  });

  navigator.clipboard.writeText(text)
    .then(() => showToast('✅ Liste in die Zwischenablage kopiert!'))
    .catch(() => showToast('⚠️ Kopieren fehlgeschlagen.'));
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Init
renderList();
updateStats();
</script>
</body>
</html>

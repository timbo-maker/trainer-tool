<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitbringliste – Abschlussfeier Seeburger SV '99</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0001A; --red-dark: #8a0012; --red-light: #f5e0e3;
    --cream: #fdf9f5; --dark: #1a1a1a; --mid: #555; --light: #e8e0d8;
    --green: #2e7d51;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }
  header { background: var(--red); color: white; padding: 2rem 1.5rem 1.5rem; text-align: center; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; top: -40px; right: -40px; width: 180px; height: 180px; background: rgba(255,255,255,0.06); border-radius: 50%; }
  header::after { content: ''; position: absolute; bottom: -30px; left: -20px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; }
  .club-badge { font-size: 2.2rem; margin-bottom: 0.4rem; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; }
  header p { margin-top: 0.4rem; font-size: 0.9rem; opacity: 0.85; }
  .event-info { display: inline-flex; gap: 1rem; margin-top: 1rem; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.85rem; }
  .event-info span { display: flex; align-items: center; gap: 0.3rem; }
  main { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .stats { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
  .stat-card { flex: 1; background: white; border-radius: 10px; padding: 0.9rem 0.75rem; text-align: center; border: 1px solid var(--light); }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--red); line-height: 1; }
  .stat-label { font-size: 0.75rem; color: var(--mid); margin-top: 0.2rem; }
  .form-card { background: white; border-radius: 14px; border: 1px solid var(--light); padding: 1.25rem; margin-bottom: 1.5rem; }
  .form-card h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 1rem; color: var(--dark); }
  .form-row { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; min-width: 140px; }
  label { font-size: 0.78rem; font-weight: 600; color: var(--mid); text-transform: uppercase; letter-spacing: 0.05em; }
  input[type="text"], input[type="password"], textarea { font-family: 'DM Sans', sans-serif; font-size: 0.95rem; border: 1.5px solid var(--light); border-radius: 8px; padding: 0.55rem 0.75rem; color: var(--dark); background: var(--cream); outline: none; transition: border-color 0.2s; width: 100%; }
  input:focus, textarea:focus { border-color: var(--red); }
  textarea { resize: vertical; min-height: 60px; }
  .category-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
  .chip { cursor: pointer; border: 1.5px solid var(--light); background: white; border-radius: 20px; padding: 0.35rem 0.8rem; font-size: 0.85rem; font-weight: 500; transition: all 0.15s; user-select: none; }
  .chip:hover { border-color: var(--red); color: var(--red); }
  .chip.selected { background: var(--red); border-color: var(--red); color: white; }
  .btn-add { width: 100%; background: var(--red); color: white; border: none; border-radius: 10px; padding: 0.75rem; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
  .btn-add:hover { background: var(--red-dark); }
  .btn-add:active { transform: scale(0.98); }
  .btn-add:disabled { background: #ccc; cursor: not-allowed; }
  .list-section h2 { font-family: 'Playfair Display', serif; font-size: 1.15rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .cat-group { margin-bottom: 1.25rem; }
  .cat-header { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--mid); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem; }
  .cat-header::after { content: ''; flex: 1; height: 1px; background: var(--light); }
  .entry-card { background: white; border: 1px solid var(--light); border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 0.5rem; display: flex; align-items: flex-start; gap: 0.75rem; animation: slideIn 0.25s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .entry-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 0.1rem; }
  .entry-body { flex: 1; }
  .entry-name { font-weight: 600; font-size: 0.95rem; }
  .entry-item { font-size: 0.88rem; color: var(--mid); margin-top: 0.1rem; }
  .entry-note { font-size: 0.82rem; color: #888; margin-top: 0.25rem; font-style: italic; }
  .entry-qty { background: var(--red-light); color: var(--red); font-size: 0.75rem; font-weight: 700; border-radius: 5px; padding: 0.15rem 0.45rem; align-self: flex-start; white-space: nowrap; }
  .btn-delete { background: none; border: none; cursor: pointer; color: #ccc; font-size: 1.1rem; transition: color 0.15s; padding: 0.1rem; flex-shrink: 0; }
  .btn-delete:hover { color: var(--red); }
  .empty-state { text-align: center; padding: 2.5rem 1rem; color: #aaa; font-size: 0.9rem; }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .loading { text-align: center; padding: 2rem; color: var(--mid); font-size: 0.9rem; }
  .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--light); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: white; padding: 0.7rem 1.4rem; border-radius: 30px; font-size: 0.9rem; font-weight: 500; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); }
  .btn-copy { width: 100%; background: white; color: var(--mid); border: 1.5px solid var(--light); border-radius: 10px; padding: 0.65rem; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
  .btn-copy:hover { border-color: var(--red); color: var(--red); }
  .refresh-btn { background: none; border: none; cursor: pointer; font-size: 0.85rem; color: var(--mid); margin-left: auto; display: flex; align-items: center; gap: 0.3rem; }
  .refresh-btn:hover { color: var(--red); }

  /* ADMIN */
  .admin-bar { display: flex; justify-content: flex-end; margin-bottom: 1rem; }
  .btn-admin-toggle { background: none; border: 1.5px solid var(--light); border-radius: 8px; padding: 0.35rem 0.85rem; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--mid); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem; }
  .btn-admin-toggle:hover { border-color: var(--red); color: var(--red); }
  .btn-admin-toggle.active { background: var(--red); border-color: var(--red); color: white; }

  /* ADMIN LOGIN OVERLAY */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.show { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 1.75rem; max-width: 340px; width: 100%; }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 0.4rem; }
  .modal p { font-size: 0.87rem; color: var(--mid); margin-bottom: 1.25rem; }
  .modal-btns { display: flex; gap: 0.75rem; margin-top: 1rem; }
  .btn-cancel { flex: 1; background: white; border: 1.5px solid var(--light); border-radius: 8px; padding: 0.65rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; }
  .btn-confirm { flex: 1; background: var(--red); color: white; border: none; border-radius: 8px; padding: 0.65rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .admin-badge { background: var(--red); color: white; font-size: 0.72rem; font-weight: 700; border-radius: 4px; padding: 0.1rem 0.4rem; margin-left: 0.4rem; vertical-align: middle; }
</style>
</head>
<body>

<header>
  <div class="club-badge">⚽</div>
  <h1>Mitbringliste<br>Abschlussfeier</h1>
  <p>Seeburger SV '99 – Jugend</p>
  <div class="event-info">
    <span>📅 6. Juli 2026</span>
    <span>🏟️ Sportplatz Seeburg</span>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="countPeople">–</div><div class="stat-label">Eltern<br>eingetragen</div></div>
    <div class="stat-card"><div class="stat-num" id="countItems">–</div><div class="stat-label">Sachen<br>zugesagt</div></div>
    <div class="stat-card"><div class="stat-num" id="countCats">–</div><div class="stat-label">Kategorien<br>abgedeckt</div></div>
  </div>

  <div class="form-card">
    <h2>✏️ Jetzt eintragen</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Dein Name *</label>
        <input type="text" id="inputName" placeholder="z. B. Familie Müller">
      </div>
      <div class="form-group">
        <label>Menge / Anzahl</label>
        <input type="text" id="inputQty" placeholder="z. B. 2 Liter">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:0.75rem">
      <label>Kategorie wählen</label>
      <div class="category-chips" id="chips"></div>
    </div>
    <div class="form-group" style="margin-bottom:0.75rem">
      <label>Was bringst du mit? *</label>
      <input type="text" id="inputItem" placeholder="z. B. Kartoffelsalat, Servietten …">
    </div>
    <div class="form-group" style="margin-bottom:1rem">
      <label>Anmerkung (optional)</label>
      <textarea id="inputNote" placeholder="z. B. ohne Fleisch, kommt gekühlt …"></textarea>
    </div>
    <button class="btn-add" id="btnAdd" onclick="addEntry()">+ Eintragen</button>
  </div>

  <div class="list-section">
    <h2>
      📋 Wer bringt was?
      <button class="refresh-btn" onclick="loadEntries()">🔄 Aktualisieren</button>
    </h2>

    <div class="admin-bar">
      <button class="btn-admin-toggle" id="btnAdminToggle" onclick="handleAdminToggle()">🔒 Admin</button>
    </div>

    <div id="listContainer">
      <div class="loading"><span class="loading-spinner"></span> Liste wird geladen …</div>
    </div>
    <button class="btn-copy" onclick="copyList()">📋 Liste als Text kopieren (für WhatsApp)</button>
  </div>
</main>

<!-- Admin Login Overlay -->
<div class="overlay" id="adminOverlay">
  <div class="modal">
    <h3>🔒 Admin-Bereich</h3>
    <p>Bitte Passwort eingeben, um Einträge löschen zu können.</p>
    <div class="form-group">
      <label>Passwort</label>
      <input type="password" id="adminPwInput" placeholder="••••" onkeydown="if(event.key==='Enter') checkPassword()">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAdminOverlay()">Abbrechen</button>
      <button class="btn-confirm" onclick="checkPassword()">Einloggen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUGF8e_7aOgGarQ6MCUDODMciAaR6xRPBNGBcmRv2o-15_73_SPTHfMuqCpx2pyUX3/exec';
const ADMIN_PW = '2203';

const CATEGORIES = [
  { label: "🥗 Salat",           id: "salat" },
  { label: "🍞 Brot & Beilagen", id: "brot" },
  { label: "🧁 Kuchen & Süßes",  id: "kuchen" },
  { label: "🧴 Sonstiges",       id: "sonstiges" },
];
const ICONS = { salat: "🥗", brot: "🍞", kuchen: "🧁", sonstiges: "🧴" };

let entries = [];
let selectedCat = null;
let isAdmin = false;

// Build chips
const chipsEl = document.getElementById('chips');
CATEGORIES.forEach(c => {
  const chip = document.createElement('div');
  chip.className = 'chip';
  chip.textContent = c.label;
  chip.dataset.id = c.id;
  chip.onclick = () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
    chip.classList.add('selected');
    selectedCat = c.id;
  };
  chipsEl.appendChild(chip);
});

// ADMIN
function handleAdminToggle() {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('btnAdminToggle').classList.remove('active');
    document.getElementById('btnAdminToggle').textContent = '🔒 Admin';
    renderList();
    showToast('Admin-Modus beendet.');
  } else {
    document.getElementById('adminOverlay').classList.add('show');
    setTimeout(() => document.getElementById('adminPwInput').focus(), 100);
  }
}

function closeAdminOverlay() {
  document.getElementById('adminOverlay').classList.remove('show');
  document.getElementById('adminPwInput').value = '';
}

function checkPassword() {
  const pw = document.getElementById('adminPwInput').value;
  if (pw === ADMIN_PW) {
    isAdmin = true;
    closeAdminOverlay();
    document.getElementById('btnAdminToggle').classList.add('active');
    document.getElementById('btnAdminToggle').innerHTML = '🔓 Admin <span class="admin-badge">AKTIV</span>';
    renderList();
    showToast('✅ Admin-Modus aktiv – du kannst jetzt Einträge löschen.');
  } else {
    showToast('⚠️ Falsches Passwort!', true);
    document.getElementById('adminPwInput').value = '';
    document.getElementById('adminPwInput').focus();
  }
}

// DATA
async function loadEntries() {
  const container = document.getElementById('listContainer');
  container.innerHTML = '<div class="loading"><span class="loading-spinner"></span> Liste wird geladen …</div>';
  try {
    const res = await fetch(SCRIPT_URL);
    entries = await res.json();
    renderList();
    updateStats();
  } catch (err) {
    container.innerHTML = '<div class="empty-state"><div class="big">⚠️</div>Fehler beim Laden. Bitte Seite neu laden.</div>';
  }
}

async function addEntry() {
  const name = document.getElementById('inputName').value.trim();
  const item = document.getElementById('inputItem').value.trim();
  const qty  = document.getElementById('inputQty').value.trim();
  const note = document.getElementById('inputNote').value.trim();

  if (!name) { showToast('⚠️ Bitte deinen Namen eintragen!', true); return; }
  if (!item)  { showToast('⚠️ Bitte angeben, was du mitbringst!', true); return; }

  const btn = document.getElementById('btnAdd');
  btn.disabled = true;
  btn.textContent = '⏳ Wird gespeichert …';

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, item, qty, note, cat: selectedCat || 'sonstiges' })
    });
    document.getElementById('inputName').value = '';
    document.getElementById('inputItem').value = '';
    document.getElementById('inputQty').value = '';
    document.getElementById('inputNote').value = '';
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
    selectedCat = null;
    showToast('✅ Danke! Eintrag gespeichert.');
    setTimeout(() => loadEntries(), 1500);
  } catch (err) {
    showToast('⚠️ Fehler beim Speichern. Bitte nochmal versuchen.', true);
  } finally {
    btn.disabled = false;
    btn.textContent = '+ Eintragen';
  }
}

async function deleteEntry(rowIndex) {
  if (!confirm('Diesen Eintrag wirklich löschen?')) return;
  showToast('⏳ Wird gelöscht …');
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', rowIndex })
    });
    showToast('✅ Eintrag gelöscht.');
    setTimeout(() => loadEntries(), 1200);
  } catch (err) {
    showToast('⚠️ Fehler beim Löschen.', true);
  }
}

function renderList() {
  const container = document.getElementById('listContainer');
  if (!entries.length) {
    container.innerHTML = '<div class="empty-state"><div class="big">🎉</div>Noch keine Einträge – seid die Ersten!</div>';
    return;
  }
  const groups = {};
  CATEGORIES.forEach(c => { groups[c.id] = []; });
  entries.forEach((e, i) => {
    const key = e.cat || 'sonstiges';
    if (!groups[key]) groups[key] = [];
    groups[key].push({ ...e, rowIndex: i + 2 }); // +2: Zeile 1 = Header, +1 für 1-basiert
  });

  let html = '';
  CATEGORIES.forEach(c => {
    if (!groups[c.id] || groups[c.id].length === 0) return;
    html += `<div class="cat-group"><div class="cat-header">${c.label}</div>`;
    groups[c.id].forEach(e => {
      html += `
        <div class="entry-card">
          <div class="entry-icon">${ICONS[e.cat] || '📦'}</div>
          <div class="entry-body">
            <div class="entry-name">${esc(e.name)}</div>
            <div class="entry-item">${esc(e.item)}</div>
            ${e.note ? `<div class="entry-note">${esc(e.note)}</div>` : ''}
          </div>
          ${e.qty ? `<div class="entry-qty">${esc(e.qty)}</div>` : ''}
          ${isAdmin ? `<button class="btn-delete" onclick="deleteEntry(${e.rowIndex})" title="Löschen">✕</button>` : ''}
        </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function updateStats() {
  const people = new Set(entries.map(e => e.name)).size;
  const cats = new Set(entries.map(e => e.cat)).size;
  document.getElementById('countPeople').textContent = people;
  document.getElementById('countItems').textContent = entries.length;
  document.getElementById('countCats').textContent = cats;
}

function copyList() {
  if (!entries.length) { showToast('⚠️ Die Liste ist noch leer.', true); return; }
  let text = "🎉 *Mitbringliste – Abschlussfeier Seeburger SV '99*\n\n";
  const groups = {};
  CATEGORIES.forEach(c => { groups[c.id] = []; });
  entries.forEach(e => { const k = e.cat || 'sonstiges'; if (!groups[k]) groups[k] = []; groups[k].push(e); });
  CATEGORIES.forEach(c => {
    if (!groups[c.id] || groups[c.id].length === 0) return;
    text += `${c.label}\n`;
    groups[c.id].forEach(e => {
      text += `• ${e.name}: ${e.item}${e.qty ? ' (' + e.qty + ')' : ''}${e.note ? ' – ' + e.note : ''}\n`;
    });
    text += '\n';
  });
  navigator.clipboard.writeText(text)
    .then(() => showToast('✅ Liste kopiert!'))
    .catch(() => showToast('⚠️ Kopieren fehlgeschlagen.', true));
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadEntries();
setInterval(loadEntries, 30000);
</script>
</body>
</html>
